<!DOCTYPE html>
<html lang="en">

<body>
     <div class="Header Header2">
        
        <div class="Handle">
             <img class="Profile" src="Images/moon.jpg" alt="Profile Picture">

        </div>
         <div class="Home">
               <a href="index.html">
                    <img src="Images/home.png" alt="Homepage" class="HomeIcon">
               </a>
         </div>

        <div class="Pages">
              <div class="Dropdown">
            <a href="categories.html">Categories</a>
            <div class="Submenu">
                <a href="nature.html">Nature</a>
                <a href="sky.html">Sky</a>
                <a href="city.html">City</a>

          </div>
               <a href="poll.html">Poll</a>

        </div>

     </div>
     <div class="PageBanner2 PageBanner">
        <p class="PageName">Nature</p>
     </div>
     <div class="CategoryWall">
        <h1 class="PhotoTitle">Natures Lense</h1>

        <div class="Polaroid" style="--rotate: -10deg; --x: -600px; --y: -300px;">
            <img src="Images/Nature/Blue bird.jpg" class="Vinyl" alt="Nature 1">
        </div>

        <div class="Polaroid" style="--rotate: -10deg; --x: 0px; --y: 200px;">
            <img src="Images/Nature/Nature road.JPG" class="Vinyl" alt="Nature 2">
        </div>

        <div class="Polaroid" style="--rotate: 0deg; --x: 0px; --y: -300px;">
            <img src="Images/Nature/Cat.JPG" class="Vinyl" alt="Nature 3">
        </div>

        <div class="Polaroid" style="--rotate: 12deg; --x: 600px; --y: -300px;">
            <img src="Images/Nature/Center Plant.jpg" class="Vinyl" alt="Nature 4">
        </div>

        <div class="Polaroid" style="--rotate: -6deg; --x: 600px; --y: 200px;">
            <img src="Images/Nature/WinBird.JPG" class="Vinyl" alt="Nature 5">
        </div>

        <div class="Polaroid" style="--rotate: 7deg; --x: -600px; --y: 200px;">
            <img src="Images/Nature/Cow.JPG" class="Vinyl" alt="Nature 6">
        </div>
     </div>

     <div class="Modal" id="Modal">
        <span class="Close" id="Close">&times;</span>
        <img class="ModalContent" id="ModalImage">
    </div>
        <div id="Lightbox">
            <span id="LightboxClose">&times;</span>
            <img id="LightboxImage">
        </div>

<script src="js/script-photos.js"></script>
