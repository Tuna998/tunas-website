<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A_Tuna's_photo_album</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/photo-layout.css">

    <link rel="icon" href="Images/icon.png" type="image/png" >



</style>


</head>
<body>
     <div class="Header Header2">
        
        <div class="Handle">
             <img class="Profile" src="Images/moon.jpg" alt="Profile Picture">
             <p>A_tuna's_Photo_Album</p>
        </div>
         <div class="Home">
               <a href="index.html">
                    <img src="Images/home.png" alt="Homepage" class="HomeIcon">
               </a>
         </div>

        <div class="Pages">
              <div class="Dropdown">
            <a href="categories.html">Categories</a>
            <div class="Submenu">
                <a href="nature.html">Nature</a>
                <a href="sky.html">Sky</a>
                <a href="city.html">City</a>
            </div>
          </div>
               <a href="poll.html">Poll</a>
               <a href="about.html">About</a>
        </div>

     </div>
     <div class="PageBanner PageBanner3">
        <p class="PageName">City</p>
     </div>
     <div class="CategoryWall">
        <h1 class="PhotoTitle">City Lights</h1>

        <div class="Polaroid" style="--rotate: -10deg; --x: -600px; --y: -300px;">
            <img src="Images/City/NYCbridge.jpg" class="Vinyl" alt="City 1">
        </div>

        <div class="Polaroid" style="--rotate: -10deg; --x: 0px; --y: 200px;">
            <img src="Images/City/Timesquare slow.jpg" class="Vinyl" alt="City 1">
        </div>
        <div class="Polaroid" style="--rotate: 0deg; --x: 0px; --y: -300px;">
            <img src="Images/City/Sign.jpg" class="Vinyl" alt="City 1">
        </div>

        <div class="Polaroid" style="--rotate: 12deg; --x: 600px; --y: -300px;">
            <img src="Images/City/Empire_sunset.jpg" class="Vinyl" alt="City 2">
        </div>

        <div class="Polaroid" style="--rotate: -6deg; --x: 600px; --y: 200px;">
            <img src="Images/City/Paris.JPG" class="Vinyl" alt="City 3">
        </div>

        <div class="Polaroid" style="--rotate: 7deg; --x: -600px; --y: 200px;">
            <img src="Images/City/Temple.jpg" class="Vinyl" alt="City 4">
        </div>
     </div>

 <div class="Modal" id="Modal">
        <span class="Close" id="Close">&times;</span>
        <img class="ModalContent" id="ModalImage">
    </div>

     <div class="Lightbox" id="Lightbox" onclick="closeLightbox()">
          <span class="LightboxClose" onclick="closeLightbox()">&times;</span>
          <img class="LightboxImage" id="LightboxImage" onclick="event.stopPropagation()">
     </div>

<script src="js/script-photos.js"></script>
</body>
</html>
