<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A_Tuna's_photo_album</title>
    <link rel="stylesheet" href="css/main.css">

    <link rel="icon" href="Images/icon.png" type="image/png" >



</style>


</head>

<body>
     <div class="Header Header1">
        
        <div class="Handle">
             <img class="Profile" src="Images/moon.jpg" alt="Profile Picture">
             <p>A_tuna's_Photo_Album</p>
        </div>
         <div class="Home">
               <a href="index.html">
                    <img src="Images/home.png" alt="Homepage" class="HomeIcon">
               </a>
         </div>

        <div class="Pages">
          <div class="Dropdown">
            <a href="categories.html">Categories</a>
            <div class="Submenu">
                <a href="nature.html">Nature</a>
                <a href="sky.html">Skyline</a>
                <a href="city.html">Sunset</a>
            </div>
          </div>
          <a href="poll.html">Poll</a>
          <a href="about.html">About</a>
        </div>

     </div>
     <div class="PageBanner">
        <p class="PageName">My photos</p>
     </div>
     <div class="Slideshow">

          <img class="Slide" src="Images/City/Timesquare slow.jpg" onclick="openLightbox(this)">
          <img class="Slide" src="Images/Nature/Nature road.JPG" onclick="openLightbox(this)">
          <img class="Slide" src="Images/Snow in the clouds.jpg" onclick="openLightbox(this)">
          <img class="Slide" src="Images/Nature/Cat.JPG" onclick="openLightbox(this)">

          <button class="Prev" onclick="changeSlide(-1)">&#10094;</button>
          <button class="Next" onclick="changeSlide(1)">&#10095;</button>
          <div class="IndicatorContainer">
               <div class="Indicator"></div>
          </div>
     </div>
     <div class="slideshowSeparator"></div>

     <div class="VinylSlider">
      <img src="Images/Sky/Above The clouds.jpg" class="Vinyl">
      <img src="Images/Sunrise.jpg" class="Vinyl">
      <img src="Images/Nature/BlueBird.jpg" class="Vinyl">
      <img src="Images/Nature/Bird Silohett.jpg" class="Vinyl">
      <img src="Images/Nature/Center Plant.jpg" class="Vinyl">
      <img src="Images/Sky/Colour Gradient.jpg" class="Vinyl">
      <img src="Images/City/Church light.jpg" class="Vinyl">
      <img src="Images/City/cityslowshutter.jpg" class="Vinyl">
      <img src="Images/Sky/Hugging The moon.jpg" class="Vinyl">
      <img src="Images/Nature/Bird_in_Frame.jpg" class="Vinyl">
      <img src="Images/Nature/Blue_Yellow_Flower.jpg" class="Vinyl">
      <img src="Images/Sky/Chasing the sunset.jpg" class="Vinyl">
      <img src="Images/City/christler.jpg" class="Vinyl">
      <img src="Images/City/subway echo.jpg" class="Vinyl">
      <img src="Images/Yellow.JPG" class="Vinyl">
      <img src="Images/City/Sign.jpg" class="Vinyl">
      <img src="Images/City/Timesquare slow.jpg" class="Vinyl">
      <img src="Images/Nature/Yawn.JPG" class="Vinyl">
      <img src="Images/Sky/Snow Clouds.jpg" class="Vinyl">
      <img src="Images/Nature/Cow.JPG" class="Vinyl">
      <img src="Images/City/Sub Sunset.jpg" class="Vinyl">
      <img src="Images/City/World Trade center.jpg" class="Vinyl">
      <img src="Images/Sky/Turquoise moon.jpg" class="Vinyl">
      <img src="Images/City/Paris.JPG" class="Vinyl">
      <img src="Images/Sky/Plane Reflection.jpg" class="Vinyl">

    </div>
<!-- Modal for pop-out -->
    <div class="Modal" id="Modal">
        <span class="Close" id="Close">&times;</span>
        <img class="ModalContent" id="ModalImage">
    </div>
     
    <audio id="bgmusic" loop>
          <source src="Audio/Sparks.mp3" type="audio/mpeg">
     </audio>

     <div id="musicBox">
          <span id="musicIcon">▶</span>
     </div>

     <script src="js/script.js"></script>

     <div class="Lightbox" id="Lightbox" onclick="closeLightbox()">
          <span class="LightboxClose" onclick="closeLightbox()">&times;</span>
          <img class="LightboxImage" id="LightboxImage" onclick="event.stopPropagation()">
     </div>

    <!-- Right-click Lightbox -->
     <div id="rightClickOverlay">
          <div class="overlayContent">What are you looking for? Just browse.</div>
     </div>

    
     
        
</body>

</html>
